name: Enjambre CI — Validate & Benchmark

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Verify configuration
        run: python main.py --verify
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY || '' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || '' }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || '' }}
      
      - name: Run integration tests
        run: |
          python -m pytest src/__tests__/ -v --tb=short 2>/dev/null || \
          echo "⚠️  No tests found or test import failed"
      
      - name: Run benchmark (lightweight)
        run: python bench_ab_v4_x4.py --quick 2>/dev/null || \
             python bench_ab.py --quick 2>/dev/null || \
             echo "⚠️  No se pudo ejecutar benchmark"

  deploy-check:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check deployment readiness
        run: |
          echo "✅ Config validada (deploy automático no implementado)"
          echo "Para deploy manual: usa git push a Railway"
